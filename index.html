<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Özgün Teknik Soğutma - Öntasarım Listesi</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: #f6f7fb;
      color: #111827;
      padding: 28px 18px;
    }

    .container {
      width: 100%;
      max-width: 1320px;
      margin: 0 auto;
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 14px;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 14px;
      border: 1px solid #d1d5db;
      background: #ffffff;
      border-radius: 10px;
      font-weight: 600;
      color: #111827;
      text-decoration: none;
      transition: 0.15s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      border-color: #93c5fd;
      box-shadow: 0 10px 18px rgba(17, 24, 39, 0.08);
    }

    .btn:active {
      transform: translateY(0);
    }

    .note {
      margin-top: 14px;
      font-size: 13px;
      color: #6b7280;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Özgün Teknik Soğutma Öntasarımları</h1>
    <div class="buttons">
      <a class="btn" target="_blank" href="index1.html">Tasarım 1</a>
      <a class="btn" target="_blank" href="index2.html">Tasarım 2</a>
      <a class="btn" target="_blank" href="index3.html">Tasarım 3</a>
      <a class="btn" target="_blank" href="index4.html">Tasarım 4</a>
      <a class="btn" target="_blank" href="index5.html">Tasarım 5</a>
    </div>
  </div>
</body>

</html>
